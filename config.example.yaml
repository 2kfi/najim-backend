# Docker Deployment Configuration
# Volumes are mounted at /app in container
# Copy to config.yaml when running with Docker

models:
  storage_path: "./models"
  download_on_startup: true

api:
  host: "0.0.0.0"
  port: 8080
  base_path: "/api/v1"
  max_audio_size_mb: 10
  allowed_audio_types:
    - "audio/wav"
    - "audio/mpeg"
    - "audio/ogg"

auth:
  default_rate_limit: 60
  api_keys:
    "sk-dev-001":
      name: dev-client
      rate_limit: 100
    "sk-prod-001":
      name: prod-client
      rate_limit: 500

# STT - compatible with Docker volumes
stt:
  model_path: "models/whisper-medium"
  hf_repo: "Systran/faster-whisper-medium"
  device: "auto" # CUDA, ROMc, CPU
  compute_type: "int8" # int8 OR fp16 OR fp32 OR int8_float16
  task: "transcribe" # transcribe or translate
  beam_size: 5
  vad_filter: true
  vad_threshold: 0.5
  vad_min_speech_duration_ms: 250
  vad_min_silence_duration_ms: 200

# TTS - use local paths
tts:
  en:
    local_path: "models/TTS-CORI-EN"
    hf_repo: "rhasspy/piper-voices"
    voice: "en.en_GB.cori.high"
    use_cuda: false
  ar:
    local_path: "./models/TTS-KAREEM-ARABIC"
    hf_repo: "rhasspy/piper-voices"
    voice: "ar.ar_JO.kareem.medium"
    use_cuda: false

settings:
  volume: 0.75          # Increased for clarity without digital clipping
  length_scale: 1.0     # Keep at 1.0; adjust to 1.1 if the voice feels too rushed
  noise_scale: 0.75     # Slightly higher than default to reduce robotic "dryness"
  noise_w_scale: 0.5    # Reduced to 0.5 to stop the voice from sounding "wobbly"
  normalize_audio: true # Keeps volume consistent across different sentences
  nchannels: 1
  sampwidth: 2
  framerate: 22050      # Most high-quality Piper models are native to 22050Hz
  use_cuda: false       # Keep false unless you have an NVIDIA GPU


llm:
#  api_url: "http://10.200.71.180:2312/v1" # OPEN-AI-API
#  api_key: "sk-no-key-required"
  model: "local-model"
  timeout: 120

mcp:
  servers: []
#    - url: "http://10.200.71.180:2527/sse"
#      api_key: ""
  sse_read_timeout: 300.0
  connect_timeout: 30.0
  tool_timeout: 60.0
  max_retries: 2
  max_tool_loops: 5

observability:
  log_level: "INFO"        # DEBUG, INFO, WARNING, ERROR
  log_format: "json"       # json or text
  metrics_enabled: true    # enable /metrics endpoint
  tracing_enabled: false