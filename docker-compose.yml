# =============================================================================
# Najim Backend — Single Node + Built-in Redis
# =============================================================================
# Usage:
#   docker compose up -d
#
# Required env vars (set in .env or export):
#   JWT_SECRET       — Long random string (openssl rand -hex 32)
#   LLM_API_KEY      — Groq API key (or your LLM provider)
#
# Optional env vars:
#   REDIS_PASSWORD   — Redis password (default: najim_pass)
#   CLUSTER_NODE_ID  — Node name (default: node-1)
#   STT_DEVICE       — auto, cpu, cuda (default: auto)
#   API_PORT         — Port mapping (default: 8080)
# =============================================================================

version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: najim-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-najim_pass} --save 60 100
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-najim_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - najim-net

  najim:
    build: .
    image: najim-backend:latest
    container_name: najim-node-1
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      REDIS_URL: "redis://:${REDIS_PASSWORD:-najim_pass}@redis:6379/0"
      JWT_SECRET: "${JWT_SECRET}"
      LLM_API_KEY: "${LLM_API_KEY}"
      LLM_MODEL: "${LLM_MODEL:-llama-3.3-70b-versatile}"
      CLUSTER_NODE_ID: "${CLUSTER_NODE_ID:-node-1}"
      STT_DEVICE: "${STT_DEVICE:-auto}"
      STT_MODEL_NAME: "${STT_MODEL_NAME:-medium}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      DEBUG: "${DEBUG:-false}"
      MODEL_DOWNLOAD: "${MODEL_DOWNLOAD:-false}"
      PIPELINE_STT_WORKERS: "${PIPELINE_STT_WORKERS:-1}"
      PIPELINE_LLM_WORKERS: "${PIPELINE_LLM_WORKERS:-1}"
      PIPELINE_TTS_WORKERS: "${PIPELINE_TTS_WORKERS:-1}"
      PIPELINE_WS_WORKERS: "${PIPELINE_WS_WORKERS:-1}"
    volumes:
      - ./models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - najim-net

volumes:
  redis-data:

networks:
  najim-net:
    driver: bridge
